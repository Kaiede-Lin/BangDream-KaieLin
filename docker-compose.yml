
services:
  # ==========================================
  # NapCatQQ - QQ 登录 & 消息收发
  # ==========================================
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: tsugu-napcat
    restart: unless-stopped
    ports:
      - "5600:5600"    # 保留未使用（之前是 Satori）
      - "6099:6099"    # Web UI
    volumes:
      - ./napcat/config/onebot11_3587847603.json:/app/napcat/config/onebot11_3587847603.json
      - ./napcat/data:/app/data              # 持久化数据
    environment:
      - TZ=Asia/Shanghai
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # ==========================================
  # Tsugu 后端 - 图片生成 & 数据查询
  # ==========================================
  backend:
    build: ./backend
    container_name: tsugu-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - LOCAL_DB=false
      - BACKEND_PORT=3000
      - USE_BANDORISTATION=true
      - BANDORI_STATION_TOKEN=FIVW1pTKfpnH
      - BANDORI_STATION_SOURCE=沐凛
      - TZ=Asia/Shanghai
    volumes:
      - backend_cache:/app/cache

  # ==========================================
  # Koishi Bot - 指令解析 & 消息处理
  # ==========================================
  koishi:
    build: ./koishi
    container_name: tsugu-koishi
    restart: unless-stopped
    ports:
      - "5170:5170"
    volumes:
      - ./koishi/data:/app/data             # 持久化 koishi.db
    depends_on:
      - backend
    environment:
      - USE_BANDORISTATION=true
      - BANDORI_STATION_SOURCE=沐凛
      - TZ=Asia/Shanghai

volumes:
  backend_cache:
