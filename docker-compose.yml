services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: tsugu-napcat
    restart: unless-stopped
    ports:
      - "5600:5600"
      - "6099:6099"
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/qqdata:/app/.config/QQ
      - ./napcat/data:/app/data
    environment:
      - NAPCAT_QUICK_ACCOUNT=3587847603
      - TZ=Asia/Shanghai
    cap_add:
      - NET_ADMIN
      - NET_RAW

  backend:
    build: ./backend
    container_name: tsugu-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - LOCAL_DB=false
      - BACKEND_PORT=3000
      - USE_BANDORISTATION=true
      - BANDORI_STATION_TOKEN=${BANDORI_STATION_TOKEN}
      - BANDORI_STATION_SOURCE=${BANDORI_STATION_SOURCE:-沐凛}
      - TZ=Asia/Shanghai
    volumes:
      - backend_cache:/app/cache

  koishi:
    build: ./koishi
    container_name: tsugu-koishi
    restart: unless-stopped
    ports:
      - "5170:5170"
    volumes:
      - ./koishi/data:/app/data
      - ./backend/config:/app/backend-config:ro
      - ./koishi/koishi.yml:/app/koishi.yml:ro
      - ./koishi/custom-shortcuts.js:/app/custom-shortcuts.js:ro
      - ./koishi/message-rank.js:/app/message-rank.js:ro
      - ./koishi/dedup.js:/app/dedup.js:ro
      - ./koishi/jrlp.js:/app/jrlp.js:ro
      - ./koishi/food.js:/app/food.js:ro
      - ./koishi/pixiv.js:/app/pixiv.js:ro
    depends_on:
      backend:
        condition: service_started
      napcat:
        condition: service_started
    environment:
      - USE_BANDORISTATION=true
      - BANDORI_STATION_TOKEN=${BANDORI_STATION_TOKEN}
      - BANDORI_STATION_SOURCE=${BANDORI_STATION_SOURCE:-沐凛}
      - TZ=Asia/Shanghai

volumes:
  backend_cache:
